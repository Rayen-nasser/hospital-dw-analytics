name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *'   # Every night at midnight UTC

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install kaggle  # Ensure kaggle is installed

      - name: Run ETL pipeline
        run: |
          echo "Running download step..."
          python src/etl/download_dataset.py
          echo "Running cleaning step..."
          python src/etl/clean_dataset.py
          echo "Running transform step..."
          python src/etl/transform_dataset.py

      - name: Retrain model
        run: |
          python src/ml/train_model.py

      - name: Kill any running API process
        run: |
          pkill -f "uvicorn\|python.*api" || echo "No process to kill"

      - name: Start API (background)
        run: |
          nohup python -m uvicorn src.ml.api:app --host 0.0.0.0 --port 8000 > api.log 2>&1 &
          sleep 5
          echo "API started in background"

      - name: Verify API health
        run: |
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health | grep -q "200" && echo "API healthy" || echo "API not responding"

      - name: Optional: Deploy to server (replace with your deployment step)
        run: |
          echo "Add your deployment step here (e.g., rsync, scp, Azure CLI, etc.)"

      - name: Commit and push changes (if any)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Automated CI/CD run: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push --force

      - name: Log final status
        run: |
          echo "CI/CD pipeline completed successfully."