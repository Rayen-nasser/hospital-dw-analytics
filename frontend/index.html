<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Readmission Risk</title>
    <style>
        /* CSS for a gorgeous, glassmorphism, animated UI */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 700; background: -webkit-linear-gradient(#4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #b0c4de; margin-bottom: 30px; font-weight: 300; line-height: 1.6; }
        
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 300px; }
        
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: #a1c4fd; }
        textarea {
            width: 100%; height: 250px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; color: #00f2fe; padding: 15px; font-family: monospace; font-size: 0.9rem;
            resize: none; outline: none; transition: all 0.3s ease;
        }
        textarea:focus { border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        
        button {
            width: 100%; padding: 15px; border: none; border-radius: 10px; margin-top: 20px;
            background: linear-gradient(90deg, #4facfe, #00f2fe); color: #fff; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 242, 254, 0.4); }
        button:active { transform: translateY(0); }
        
        .result-card {
            background: rgba(0, 0, 0, 0.3); border-radius: 15px; padding: 25px; margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05); display: none; flex-direction: column; align-items: center;
        }
        .result-card.active { display: flex; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .risk-badge {
            font-size: 1.5rem; font-weight: 700; padding: 10px 20px; border-radius: 30px; margin-bottom: 15px;
        }
        .high-risk { background: rgba(255, 75, 75, 0.2); color: #ff4b4b; border: 1px solid rgba(255, 75, 75, 0.5); }
        .low-risk { background: rgba(0, 230, 118, 0.2); color: #00e676; border: 1px solid rgba(0, 230, 118, 0.5); }
        
        .prob-bar-container { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .prob-bar { height: 100%; background: linear-gradient(90deg, #ff4b4b, #ff9800); width: 0%; transition: width 1s ease-in-out; }
        .prob-bar.safe { background: linear-gradient(90deg, #00e676, #1de9b6); }
        
        .links { margin-top: 20px; text-align: center; }
        .links a { color: #00f2fe; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        .links a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Readmission Risk AI</h1>
        <p class="subtitle">Enter patient parameters to predict the probability of readmission within 30 days. Uses the trained Machine Learning model via the FastAPI backend.</p>
        
        <div class="flex-row">
            <div class="flex-col">
                <label for="jsonInput">Patient Data (JSON Format)</label>
                <textarea id="jsonInput">{
  "time_in_hospital": 3,
  "num_lab_procedures": 59,
  "num_procedures": 0,
  "num_medications": 18,
  "number_outpatient": 0,
  "number_emergency": 0,
  "number_inpatient": 0,
  "age": "[50-60)",
  "gender": "Female",
  "race": "Caucasian",
  "metformin": "No",
  "insulin": "Up",
  "diabetesMed": "Yes",
  "change": "Ch"
}</textarea>
            </div>
            <div class="flex-col" style="display: flex; flex-direction: column; justify-content: center;">
                <button id="predictBtn">Analyze Risk</button>
                
                <div class="result-card" id="resultCard">
                    <div class="risk-badge" id="riskBadge">Analyzing...</div>
                    <p style="color: #b0c4de; font-size: 0.9rem;">Readmission Probability: <span id="probValue" style="color: #fff; font-weight: bold;">0%</span></p>
                    <div class="prob-bar-container">
                        <div class="prob-bar" id="probBar"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="links">
            <a href="/docs" target="_blank">View API Documentation (Swagger)</a>
        </div>
    </div>

    <script>
        document.getElementById('predictBtn').addEventListener('click', async () => {
            const btn = document.getElementById('predictBtn');
            const resultCard = document.getElementById('resultCard');
            const riskBadge = document.getElementById('riskBadge');
            const probValue = document.getElementById('probValue');
            const probBar = document.getElementById('probBar');
            
            try {
                const inputData = JSON.parse(document.getElementById('jsonInput').value);
                
                btn.innerText = "Analyzing...";
                btn.style.opacity = "0.7";
                btn.disabled = true;
                
                // Show analyzing state
                resultCard.classList.add('active');
                riskBadge.innerText = "Processing...";
                riskBadge.className = "risk-badge";
                probBar.style.width = "0%";
                
                // Call API
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: inputData })
                });
                
                if (!response.ok) throw new Error("API Error: " + response.statusText);
                
                const result = await response.json();
                
                const isHighRisk = result.prediction === 1;
                const prob = (result.probability_readmitted * 100).toFixed(1);
                
                riskBadge.innerText = isHighRisk ? "HIGH RISK" : "LOW RISK";
                riskBadge.className = `risk-badge ${isHighRisk ? 'high-risk' : 'low-risk'}`;
                probValue.innerText = `${prob}%`;
                
                probBar.className = `prob-bar ${isHighRisk ? '' : 'safe'}`;
                setTimeout(() => { probBar.style.width = `${prob}%`; }, 100);
                
            } catch (err) {
                alert("Error: Please check your JSON format or make sure the API is running.\nDetails: " + err.message);
                resultCard.classList.remove('active');
            } finally {
                btn.innerText = "Analyze Risk";
                btn.style.opacity = "1";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
